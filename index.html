<!DOCTYPE html>
<html lang="tr">
<head>
    <title>YDS Mentor AI - VIP Workstation</title>
    <meta charset="utf-8">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0b0f19; color: #f8fafc; margin: 0; display: flex; min-height: 100vh; }
        .sidebar { width: 280px; background: rgba(15, 23, 42, 0.8); border-right: 1px solid rgba(255,255,255,0.08); padding: 30px 20px; display: flex; flex-direction: column; justify-content: space-between; box-sizing: border-box; }
        .mentor-profile { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(8px); padding: 20px; border-radius: 16px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .mentor-avatar { font-size: 45px; margin-bottom: 10px; display: inline-block; animation: float 3s infinite ease-in-out; }
        .mentor-name { font-weight: 700; color: #38bdf8; font-size: 16px; }
        .user-badge { margin-top: 15px; display: inline-block; background: rgba(56, 189, 248, 0.1); color: #38bdf8; font-size: 11px; padding: 4px 12px; border-radius: 9999px; font-weight: 600; text-transform: uppercase; }
        .stats-container { margin-top: 30px; }
        .stat-box { background: rgba(30, 41, 59, 0.3); padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.03); }
        .stat-val { font-size: 22px; font-weight: 700; color: #f8fafc; }
        .stat-lbl { font-size: 12px; color: #94a3b8; }
        .progress-bg { background: rgba(255,255,255,0.05); height: 6px; border-radius: 9999px; margin-top: 8px; overflow: hidden; }
        .progress-bar { background: #38bdf8; height: 100%; width: 0%; transition: width 0.5s ease; }
        .main-content { flex: 1; padding: 40px; display: flex; align-items: center; justify-content: center; }
        .quiz-card { width: 100%; max-width: 720px; background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(16px); padding: 40px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.08); }
        .badge { background: rgba(56, 189, 248, 0.15); color: #38bdf8; padding: 6px 14px; border-radius: 9999px; font-size: 11px; font-weight: 700; text-transform: uppercase; display: inline-block; margin-bottom: 20px; }
        .question-text { font-size: 19px; font-weight: 600; line-height: 1.6; margin-bottom: 30px; }
        .option-container { display: flex; align-items: center; padding: 16px; margin-bottom: 12px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; cursor: pointer; transition: all 0.2s ease; }
        .option-container:hover { background: rgba(255,255,255,0.05); transform: translateX(4px); }
        .checkmark { height: 18px; width: 18px; border: 2px solid rgba(255,255,255,0.2); border-radius: 50%; margin-right: 15px; display: inline-block; }
        .option-selected { background: rgba(56, 189, 248, 0.1) !important; border-color: #38bdf8 !important; }
        .option-correct { background: rgba(16, 185, 129, 0.15) !important; border-color: #10b981 !important; color: #34d399; }
        .option-wrong { background: rgba(239, 68, 68, 0.15) !important; border-color: #ef4444 !important; color: #f87171; }
        .btn-submit { background: #38bdf8; color: #0f172a; border: none; padding: 14px; font-size: 15px; font-weight: 700; border-radius: 10px; cursor: pointer; width: 100%; margin-top: 15px; }
        .btn-submit:hover { background: #0ea5e9; }
        .result-box { margin-top: 25px; display: none; background: #1e293b; border-left: 4px solid #38bdf8; padding: 20px; border-radius: 0 10px 10px 0; white-space: pre-wrap; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    </style>
</head>
<body>
    <div class="sidebar">
        <div>
            <div class="mentor-profile">
                <span class="mentor-avatar">🤖</span>
                <div class="mentor-name">YDS Mentor AI</div>
                <span class="user-badge">Advanced Learner</span>
            </div>
            <div class="stats-container">
                <div class="stat-box">
                    <div class="stat-val" id="statTotal">0</div>
                    <div class="stat-lbl">Çözülen Soru</div>
                </div>
                <div class="stat-box">
                    <div class="stat-val" id="statRatio">0%</div>
                    <div class="stat-lbl">Doğruluk Oranı</div>
                    <div class="progress-bg"><div class="progress-bar" id="progressBar"></div></div>
                </div>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="quiz-card" id="quizCard">
            <div class="badge">👑 ÖSYM YDS AYARI (VOCABULARY)</div>
            <div class="question-text" id="qText">Yükleniyor...</div>
            <div id="optionsBox"></div>
            <button id="actionBtn" class="btn-submit" onclick="checkAnswer()">Cevabı Gönder</button>
            <div id="resultBox" class="result-box"></div>
            <div style="font-size:11px;color:#64748b;margin-top:15px;text-align:right;" id="stokInfo">Stok: -</div>
        </div>
    </div>

    <script>
        const NEXT_LABEL = "🔄 Sıradaki Soruyu Getir";
        const RETRY_LABEL = "🔄 Soruları Kontrol Et";

        let currentQuestion = null;
        let selectedLetter = null;
        let solved = parseInt(localStorage.getItem('yds_solved') || '0');
        let correct = parseInt(localStorage.getItem('yds_correct') || '0');

        async function loadQuestion() {
            selectedLetter = null;
            document.getElementById('resultBox').style.display = "none";
            document.getElementById('actionBtn').innerText = "Cevabı Gönder";
            document.getElementById('actionBtn').setAttribute("onclick", "checkAnswer()");

            try {
                const res = await fetch('/api/next-question');
                if (!res.ok) throw new Error("HTTP " + res.status);
                const data = await res.json();

                if (data.error === "loading") {
                    document.getElementById('qText').innerText =
                        "🔋 İlk ÖSYM standartlarındaki elit sorular arkada işleniyor, lütfen biraz bekleyip aşağıdaki butona basın...";
                    document.getElementById('optionsBox').innerHTML = "";
                    document.getElementById('actionBtn').innerText = RETRY_LABEL;
                    document.getElementById('actionBtn').setAttribute("onclick", "loadQuestion()");
                    return;
                }

                currentQuestion = data;
                document.getElementById('qText').innerText = data.question_text;
                document.getElementById('stokInfo').innerText = "Depodaki VIP Soru: " + data.current_count;

                let html = "";
                for (let [letter, text] of Object.entries(data.options).sort()) {
                    html += `<div class="option-container" id="label_${letter}" onclick="handleSelect('${letter}')">
                        <span class="checkmark"></span>
                        <span><strong>${letter})</strong> ${text}</span>
                    </div>`;
                }
                document.getElementById('optionsBox').innerHTML = html;
                updateStats();
            } catch (e) {
                document.getElementById('qText').innerText = "Backend ile bağlantı kurulamadı.";
                document.getElementById('optionsBox').innerHTML = "";
            }
        }

        function handleSelect(letter) {
            const btnText = document.getElementById('actionBtn').innerText;
            if (btnText === NEXT_LABEL || btnText === RETRY_LABEL) return;
            selectedLetter = letter;
            document.querySelectorAll('.option-container').forEach(el => el.classList.remove('option-selected'));
            document.getElementById('label_' + letter).classList.add('option-selected');
        }

        function checkAnswer() {
            if (!selectedLetter) { alert("Lütfen bir şık seçin!"); return; }

            let correctAns = currentQuestion.correct_option;
            document.querySelectorAll('.option-container').forEach(el => {
                let id = el.id.replace('label_', '');
                if (id === correctAns) el.className = "option-container option-correct";
                else if (id === selectedLetter) el.className = "option-container option-wrong";
            });

            solved++;
            if (selectedLetter === correctAns) { correct++; }
            localStorage.setItem('yds_solved', solved);
            localStorage.setItem('yds_correct', correct);
            updateStats();

            let rBox = document.getElementById('resultBox');
            rBox.style.display = "block";
            rBox.innerHTML = `<strong>🤖 Detaylı Mentor Analizi:</strong>\n\n` + (currentQuestion.ai_explanation || "Bu soru için açıklama eklenmemiş.");

            document.getElementById('actionBtn').innerText = NEXT_LABEL;
            document.getElementById('actionBtn').setAttribute("onclick", "loadQuestion()");
        }

        function updateStats() {
            document.getElementById('statTotal').innerText = solved;
            let ratio = solved > 0 ? Math.round((correct / solved) * 100) : 0;
            document.getElementById('statRatio').innerText = ratio + "%";
            document.getElementById('progressBar').style.width = ratio + "%";
        }

        loadQuestion();
    </script>
</body>
</html>
